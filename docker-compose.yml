services:
  app:
    build: .
    image: fundflow:local
    container_name: fundflow-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-fundflow}
      DB_USERNAME: ${POSTGRES_USER:-fundflow}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fundflow}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: fundflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fundflow}
      POSTGRES_USER: ${POSTGRES_USER:-fundflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fundflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fundflow} -d $${POSTGRES_DB:-fundflow}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
