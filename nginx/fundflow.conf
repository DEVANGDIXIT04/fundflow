# NGINX reverse proxy for FundFlow on EC2.
# Install to /etc/nginx/conf.d/fundflow.conf (replace the default server block).
# certbot rewrites this file when issuing the certificate -- run it AFTER
# this config is in place and DNS resolves:
#   sudo certbot --nginx -d <yourname>.duckdns.org

server {
    listen 80;
    server_name fundflow.duckdns.org;   # <-- replace with your DuckDNS subdomain

    # App
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint may be probed frequently; skip access log noise.
    location /actuator/health {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }
}
