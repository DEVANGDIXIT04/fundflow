spring.application.name=fundflow

# Datasource: env vars override the local docker-compose defaults (12-factor config)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fundflow}
spring.datasource.username=${DB_USERNAME:fundflow}
spring.datasource.password=${DB_PASSWORD:fundflow}

# Dev convenience: recreate the schema on every start and reseed from data.sql.
# Production overrides these via env vars (DDL_AUTO=validate, SQL_INIT_MODE=never).
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:always}

spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=FundFlow
info.app.description=Capital Call Tracker REST API for VC fund administration
