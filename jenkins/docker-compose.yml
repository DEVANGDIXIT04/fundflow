services:
  jenkins:
    build: .
    image: fundflow-jenkins:lts
    container_name: fundflow-jenkins
    user: root
    ports:
      - "8081:8080"    # Jenkins UI (8080 is taken by the app)
      - "50000:50000"  # inbound agents (unused locally, standard port)
    environment:
      # Testcontainers runs inside this container but its DB containers run on
      # the HOST daemon -- mapped ports are reachable via host.docker.internal.
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
